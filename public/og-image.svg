  <g transform="translate(140,150)">
    <rect x="0"   y="0"   width="150" height="150" rx="22" fill="#F5C518"/>
    <rect x="170" y="0"   width="150" height="150" rx="22" fill="#E8433A"/>
    <rect x="0"   y="170" width="150" height="150" rx="22" fill="#2A7AE4"/>
